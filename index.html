<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZenithTools | المنصة الاحترافية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        .container { max-width: 800px; margin: auto; }
        h1 { text-align: center; color: var(--accent); }
        .tool-card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #30363d; margin-top: 20px; }
        textarea { width: 100%; height: 100px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 8px; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #0b0e14; }
    </style>
</head>
<body>

<div class="container">
    <h1>ZenithTools - أدوات احترافية</h1>
    
    <div class="tool-card">
        <h3>📄 محول النصوص إلى PDF</h3>
        <textarea id="pdfText" placeholder="اكتب نصك هنا لتحويله لملف PDF..."></textarea>
        <button onclick="downloadPDF()">تحميل كـ PDF</button>
    </div>
</div>

<script>
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const text = document.getElementById('pdfText').value;
        doc.text(text, 10, 10);
        doc.save("ZenithTools_Document.pdf");
    }
</script>
</body>
</html>
