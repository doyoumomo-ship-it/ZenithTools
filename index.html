<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowForge - أدوات الفريلانسرز الذكية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; }
    .tool-card:hover { transform: translateY(-10px); }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

  <nav class="bg-slate-900 border-b border-slate-700 py-6 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center text-3xl font-bold">FF</div>
        <h1 class="text-4xl font-bold">FlowForge</h1>
      </div>
      <div class="text-xl font-medium">أدوات الفريلانسرز</div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-16">
    <h1 class="text-5xl font-bold text-center mb-4">أدوات الفريلانسرز الذكية</h1>
    <p class="text-center text-slate-400 text-xl mb-16">كل ما تحتاجه لتوفير الوقت وزيادة أرباحك</p>

    <div class="grid md:grid-cols-2 gap-8">

      <!-- Proposal -->
      <div class="tool-card bg-slate-800 rounded-3xl p-8">
        <h2 class="text-2xl font-bold mb-6">مولد عروض أسعار احترافية</h2>
        <textarea id="prop" rows="4" class="w-full bg-slate-900 rounded-2xl p-5 mb-6" placeholder="اكتب وصف المشروع..."></textarea>
        <button onclick="generateProposal()" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-bold text-lg">توليد العرض</button>
        <div id="propOut" class="mt-6 bg-slate-900 p-6 rounded-2xl text-sm min-h-[140px]"></div>
      </div>

      <!-- Content Repurpose -->
      <div class="tool-card bg-slate-800 rounded-3xl p-8">
        <h2 class="text-2xl font-bold mb-6">إعادة استخدام المحتوى</h2>
        <textarea id="content" rows="4" class="w-full bg-slate-900 rounded-2xl p-5 mb-6" placeholder="الصق منشورك أو مقالتك..."></textarea>
        <button onclick="repurpose()" class="w-full bg-purple-600 hover:bg-purple-700 py-5 rounded-2xl font-bold text-lg">تحويل إلى منشورات</button>
        <div id="repOut" class="mt-6 space-y-3"></div>
      </div>

    </div>
  </div>

  <script>
    function generateProposal() {
      const text = document.getElementById('prop').value || "تصميم موقع";
      document.getElementById('propOut').innerHTML = `
        <strong>عرض سعر احترافي:</strong><br><br>
        مرحباً،<br>
        بناءً على طلبك في ${text}، سأقوم بتسليم المشروع بجودة عالية.<br><br>
        المدة: 10-14 يوم<br>
        السعر: 800 - 1800 دولار<br><br>
        جاهز للبدء؟
      `;
    }

    function repurpose() {
      const text = document.getElementById('content').value || "هذا مشروع رائع";
      const out = document.getElementById('repOut');
      out.innerHTML = `
        <div class="bg-slate-900 p-4 rounded-2xl">🔥 ${text.substring(0,60)}... #فريلانس</div>
        <div class="bg-slate-900 p-4 rounded-2xl">💡 نصيحة: ${text.substring(0,50)}</div>
        <div class="bg-slate-900 p-4 rounded-2xl">📌 خلاصة المشروع: ${text.substring(0,70)}...</div>
      `;
    }
  </script>

</body>
</html>
