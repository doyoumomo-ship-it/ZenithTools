<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoMind - حول أفكارك إلى فن</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .hero { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-gray-950 text-white">

  <!-- Hero Section -->
  <section class="hero min-h-screen flex items-center">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h1 class="text-6xl md:text-7xl font-bold mb-6 leading-tight">
        أفكارك تستاهل تتحول<br>إلى <span class="text-yellow-300">فن</span>
      </h1>
      <p class="text-xl md:text-2xl mb-10 text-gray-200">
        اكتب فكرة.. نحولها لصورة، اقتباس، أو فيديو في ثواني
      </p>
      
      <div class="max-w-xl mx-auto">
        <div class="glass rounded-3xl p-2">
          <input id="ideaInput" 
                 type="text" 
                 placeholder="اكتب فكرتك هنا..." 
                 class="w-full bg-transparent border-0 focus:outline-none text-lg px-8 py-6 rounded-3xl">
        </div>
        <button onclick="generateIdea()" 
                class="mt-6 bg-white text-indigo-700 font-bold text-xl px-12 py-5 rounded-3xl hover:scale-105 transition-all flex items-center gap-3 mx-auto">
          <i class="fas fa-magic"></i>
          ولّد الآن
        </button>
      </div>
    </div>
  </section>

  <!-- Result Section -->
  <div id="result" class="hidden max-w-4xl mx-auto px-6 py-12">
    <div class="bg-gray-900 rounded-3xl p-8 text-center">
      <h2 class="text-3xl font-bold mb-6">نتيجة إبداعك ✨</h2>
      <div id="generatedContent" class="space-y-8"></div>
    </div>
  </div>

  <script>
    function generateIdea() {
      const input = document.getElementById('ideaInput').value;
      if (!input) {
        alert("اكتب فكرة أولاً!");
        return;
      }

      const resultDiv = document.getElementById('result');
      const content = document.getElementById('generatedContent');
      
      content.innerHTML = `
        <div class="bg-gradient-to-br from-purple-600 to-indigo-600 rounded-2xl p-10 text-white">
          <p class="text-2xl italic">"${input}"</p>
          <p class="mt-8 text-sm opacity-75">— EchoMind AI</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
          <div class="bg-gray-800 rounded-2xl p-6">
            <p class="text-amber-400 font-bold mb-3">صورة مولدة:</p>
            <img src="https://picsum.photos/id/${Math.floor(Math.random()*1000)}/600/400" class="rounded-xl w-full">
          </div>
          <div class="bg-gray-800 rounded-2xl p-6">
            <p class="text-sky-400 font-bold mb-3">اقتباس مصمم:</p>
            <div class="h-64 flex items-center justify-center text-2xl font-serif border border-dashed border-gray-600 rounded-xl">
              ${input}
            </div>
          </div>
        </div>
      `;
      
      resultDiv.classList.remove('hidden');
      resultDiv.scrollIntoView({ behavior: "smooth" });
    }

    // إضافة تأثير عند الضغط على Enter
    document.getElementById('ideaInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') generateIdea();
    });
  </script>
</body>
</html>
