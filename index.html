<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithTools | القمة في الأداء</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0b0e14; }
        body { background: radial-gradient(circle at 50% 50%, #1a1a2e, #0b0e14); min-height: 100vh; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; text-align: center; }
        .logo { width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5)); }
        h1 { color: var(--gold); font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 30px; transition: 0.4s; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 100px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 10px; color: white; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(45deg, #d4af37, #aa8811); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <!-- استبدل "logo.png" باسم صورتك -->
    <img src="logo.png" class="logo" alt="Zenith Logo">
    <h1>ZENITH TOOLS</h1>
    <p>منصة الأداء الفائق للأعمال الاحترافية</p>

    <div class="grid">
        <!-- أداة PDF -->
        <div class="card">
            <h3>📄 محول النصوص لـ PDF</h3>
            <textarea id="pdfText" placeholder="اكتب المحتوى هنا..."></textarea>
            <button onclick="downloadPDF()">تحميل الوثيقة</button>
        </div>
        
        <!-- بطاقة إضافية (مستقبلية) -->
        <div class="card">
            <h3>⚙️ معالجة البيانات</h3>
            <p>أدوات متقدمة قيد التطوير...</p>
            <button style="background: transparent; border: 1px solid var(--gold);">قريباً</button>
        </div>
    </div>
</div>

<script>
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(document.getElementById('pdfText').value, 10, 10);
        doc.save("ZenithTools_Document.pdf");
    }
</script>
</body>
</html>
