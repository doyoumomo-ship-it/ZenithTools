<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZenithTools</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        button { background: #58a6ff; border: none; padding: 8px 15px; border-radius: 5px; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #428bca; }
    </style>
</head>
<body>

    <h1>ZenithTools</h1>
    <div class="grid" id="toolBox"></div>

<script>
    // 1. تعريف وظائف الأدوات (الدوال)
    function runTool1() { alert("تم تشغيل أداة توليد كلمة السر!"); }
    function runTool2() { alert("تم تشغيل أداة تحويل PDF!"); }

    // 2. قائمة الأدوات
    const tools = [
        { name: "توليد كلمة سر", action: "runTool1()" },
        { name: "تحويل PDF", action: "runTool2()" }
    ];

    // 3. المحرك الذي يولد البطاقات
    const container = document.getElementById('toolBox');
    tools.forEach(tool => {
        container.innerHTML += `
            <div class="card">
                <h3>${tool.name}</h3>
                <button onclick="${tool.action}">تشغيل</button>
            </div>
        `;
    });
</script>
</body>
</html>
