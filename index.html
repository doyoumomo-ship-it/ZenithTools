<div class="card">
    <h3>🤖 محلل المشاعر (AI)</h3>
    <textarea id="textAI" placeholder="اكتب جملة بالإنجليزية لأحللها..."></textarea>
    <button onclick="analyzeSentiment()">تحليل النص</button>
    <p id="aiResult" style="font-size: 1.2rem; color: #38bdf8;"></p>
</div>

<script>
    function analyzeSentiment() {
        const text = document.getElementById('textAI').value.toLowerCase();
        const positiveWords = ['good', 'great', 'happy', 'love', 'excellent', 'amazing'];
        const negativeWords = ['bad', 'sad', 'hate', 'terrible', 'worst', 'awful'];
        
        let score = 0;
        positiveWords.forEach(word => { if(text.includes(word)) score++; });
        negativeWords.forEach(word => { if(text.includes(word)) score--; });

        let result = score > 0 ? "إيجابي 😊" : score < 0 ? "سلبي 😞" : "محايد 😐";
        document.getElementById('aiResult').innerText = "النتيجة: " + result;
    }
</script>
