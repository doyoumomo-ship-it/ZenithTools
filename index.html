<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithCore - منصة الإدارة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center">

    <div class="max-w-2xl w-full p-8 bg-gray-800 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-4xl font-bold mb-6 text-indigo-400">ZenithCore</h1>
        <p class="mb-8 text-gray-400">أنت الآن في نواة النظام. هذا هو الهيكل الذي سيتحول لاحقاً إلى منصة أعمال متكاملة.</p>
        
        <div id="app" class="space-y-4">
            <input type="text" id="actionInput" placeholder="أدخل بيانات المعالجة..." class="w-full p-4 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-indigo-500">
            <button onclick="processData()" class="w-full bg-indigo-600 hover:bg-indigo-700 p-4 rounded-lg font-bold transition">بدء المعالجة الذكية</button>
        </div>

        <div id="output" class="mt-8 p-4 bg-gray-900 rounded-lg hidden border border-indigo-900">
            <!-- هنا ستظهر نتائج التحليل أو المعالجة -->
        </div>
    </div>

    <script>
        function processData() {
            const input = document.getElementById('actionInput').value;
            const output = document.getElementById('output');
            
            if(!input) return alert("يرجى إدخال البيانات");

            output.classList.remove('hidden');
            output.innerHTML = `<p class="text-green-400">تمت معالجة: "${input}" بنجاح عبر بروتوكول Zenith.</p>`;
            
            // هذا المكان هو حيث ستقوم لاحقاً بربط API الخاص بـ OpenAI أو Supabase
        }
    </script>
</body>
</html>
