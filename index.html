<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithTools | المنصة الاحترافية</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .tool-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; transition: 0.3s; }
        .tool-card:hover { border-color: var(--accent); }
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: none; box-sizing: border-box; }
        button { background: var(--accent); color: var(--bg); font-weight: bold; cursor: pointer; }
        .result { margin-top: 10px; font-weight: bold; color: var(--accent); word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h1>ZenithTools - 15 أداة احترافية</h1>
    <div class="grid" id="toolGrid">
        </div>
</div>

<script>
    const tools = [
        "مولد كلمة سر", "محول PDF", "صانع QR Code", "حاسبة العمر", "عداد كلمات",
        "محول وحدات", "ضاغط صور", "حاسبة ربح", "منسق نصوص", "كاشف نصوص",
        "مؤقت بومودورو", "محول JSON", "فحص روابط", "محول تاريخ", "توليد ألوان"
    ];

    const grid = document.getElementById('toolGrid');
    tools.forEach((name, index) => {
        grid.innerHTML += `
            <div class="tool-card">
                <h3>${index + 1}. ${name}</h3>
                <input type="text" placeholder="مدخلات ${name}...">
                <button onclick="alert('جاري تجهيز ${name}')">تنفيذ الأداة</button>
                <div class="result" id="res${index}"></div>
            </div>
        `;
    });
</script>
</body>
</html>
