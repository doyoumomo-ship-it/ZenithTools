<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<div class="tool-card">
    <h3>📄 محول النصوص إلى PDF</h3>
    <textarea id="pdfText" placeholder="اكتب نصك هنا..." style="width:100%; height:100px; background:#0d1117; color:#fff; border:1px solid #30363d; border-radius:8px;"></textarea>
    <button onclick="downloadPDF()">تحميل كـ PDF</button>
</div>
<script>
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const text = document.getElementById('pdfText').value;
        
        doc.setFont("helvetica");
        doc.text(text, 10, 10);
        doc.save("ZenithTools_Document.pdf");
    }
</script>
