<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZenithTools</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        button { background: #58a6ff; border: none; padding: 10px; border-radius: 5px; color: white; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <h1>ZenithTools 🚀</h1>
    <div class="grid" id="toolBox"></div>

    <script>
        const tools = [
            { name: "توليد كلمة سر", action: "alert('كلمة السر: ' + Math.random().toString(36).slice(-8))" },
            { name: "حاسبة النسبة", action: "alert('جاري التطوير..')" },
            { name: "عداد الحروف", action: "alert('جاري التطوير..')" }
        ];

        const container = document.getElementById('toolBox');
        
        tools.forEach(tool => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${tool.name}</h3><button onclick="${tool.action}">تشغيل</button>`;
            container.appendChild(div);
        });
    </script>
</body>
</html>
