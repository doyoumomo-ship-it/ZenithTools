<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>.tab-content { display: none; } .tab-content.active { display: block; }</style>
</head>
<body class="bg-gray-950 text-white p-6">
    <div class="flex gap-8">
        <aside class="w-64 space-y-2">
            <button onclick="switchTab('json-tool')" class="w-full text-left p-3 bg-gray-900 rounded">JSON Formatter</button>
            <button onclick="switchTab('qr-tool')" class="w-full text-left p-3 bg-gray-900 rounded">QR Generator</button>
        </aside>

        <main class="flex-1">
            <div id="json-tool" class="tab-content active">
                <h2 class="text-xl font-bold">JSON Formatter</h2>
                </div>
            
            <div id="qr-tool" class="tab-content">
                <h2 class="text-xl font-bold mb-4">QR Code Generator</h2>
                <input type="text" id="qr-input" class="w-full p-2 bg-gray-800 rounded mb-2" placeholder="Enter text...">
                <button onclick="generateQR()" class="bg-indigo-600 px-4 py-2 rounded">Generate QR</button>
                <div id="qr-result" class="mt-4"></div>
            </div>
        </main>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function generateQR() {
            const text = document.getElementById('qr-input').value;
            if(text) {
                document.getElementById('qr-result').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(text)}">`;
            }
        }
    </script>
</body>
</html>
