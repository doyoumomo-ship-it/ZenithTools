    <script>
        const tools = [
            { name: "توليد كلمة سر", action: () => alert('كلمة السر: ' + Math.random().toString(36).slice(-8)) },
            { name: "حاسبة النسبة", action: () => { let n = prompt('أدخل الرقم:'); if(n) alert(n * 0.2) } },
            { name: "عداد الحروف", action: () => { let t = prompt('أدخل النص:'); if(t) alert(t.length) } },
            { name: "تحويل لـ CAPITAL", action: () => { let t = prompt('أدخل النص:'); if(t) alert(t.toUpperCase()) } },
            { name: "عكس النص", action: () => { let t = prompt('أدخل النص:'); if(t) alert(t.split('').reverse().join('')) } },
            { name: "أرقام حظ", action: () => alert('رقم حظك: ' + Math.floor(Math.random() * 100)) },
            { name: "كيلو لـ باوند", action: () => { let k = prompt('أدخل الكيلو:'); if(k) alert(k * 2.2) } },
            { name: "حساب أيام العمر", action: () => { let y = prompt('عمرك بالسنوات:'); if(y) alert(y * 365) } },
            { name: "اختصار رابط", action: () => alert('zenith.ly/short') },
            { name: "توليد لون", action: () => alert('#' + Math.floor(Math.random()*16777215).toString(16)) }
        ];

        const container = document.getElementById('toolBox');
        tools.forEach(tool => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${tool.name}</h3>`;
            
            const btn = document.createElement('button');
            btn.innerText = 'تشغيل';
            // الطريقة المباشرة والأكثر توافقاً
            btn.onclick = function() {
                tool.action();
            };
            
            card.appendChild(btn);
            container.appendChild(card);
        });
    </script>
