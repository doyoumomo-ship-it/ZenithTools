<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حكايتي - حول لحظاتك إلى قصص خالدة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
    body { font-family: 'Cairo', sans-serif; }
    .hero { background: linear-gradient(135deg, #1e0f2e 0%, #4c1d95 100%); }
  </style>
</head>
<body class="bg-gray-950 text-white">

  <nav class="fixed top-0 w-full z-50 bg-black/70 backdrop-blur-lg">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-4xl font-black">حكايتي</h1>
      <button onclick="startNow()" class="bg-gradient-to-r from-purple-600 to-pink-600 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition">
        جرب الآن مجاناً
      </button>
    </div>
  </nav>

  <section class="hero min-h-screen flex items-center pt-20">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h1 class="text-6xl md:text-7xl font-black leading-tight mb-8">
        لحظتك العادية..<br>تصير <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">حكاية خالدة</span>
      </h1>
      <p class="text-2xl text-gray-300 max-w-2xl mx-auto mb-12">
        ارفع صورة أو فيديو أو اكتب وصف.. والذكاء الاصطناعي يحولها لفيديو قصير احترافي جاهز للنشر
      </p>

      <div class="max-w-xl mx-auto glass rounded-3xl p-3 bg-white/10 backdrop-blur-xl">
        <input id="prompt" type="text" 
               placeholder="مثال: أول يوم مدرسة لابنتي.." 
               class="w-full bg-transparent px-8 py-7 text-xl focus:outline-none rounded-3xl">
      </div>

      <button onclick="generateDemo()" 
              class="mt-10 bg-white text-black font-bold text-2xl px-16 py-7 rounded-3xl flex items-center gap-4 mx-auto hover:bg-yellow-300 transition">
        <i class="fas fa-magic"></i>
        حوّل لحظتي الآن
      </button>

      <p class="text-gray-400 mt-8">أكثر من 120,000 حكاية تم إنشاؤها هذا الشهر</p>
    </div>
  </section>

  <div id="result" class="hidden max-w-5xl mx-auto px-6 py-20">
    <div id="demoContent"></div>
  </div>

  <script>
    function generateDemo() {
      const input = document.getElementById('prompt').value.trim() || "أول يوم مدرسة لابنتي";
      const result = document.getElementById('result');
      const content = document.getElementById('demoContent');

      content.innerHTML = `
        <div class="text-center py-12">
          <div class="animate-spin w-20 h-20 border-4 border-purple-500 border-t-transparent rounded-full mx-auto mb-6"></div>
          <p class="text-2xl">حكايتي يكتب قصتك...</p>
        </div>
      `;
      result.classList.remove('hidden');
      result.scrollIntoView({ behavior: "smooth" });

      setTimeout(() => {
        content.innerHTML = `
          <div class="bg-gray-900 rounded-3xl overflow-hidden shadow-2xl">
            <img src="https://picsum.photos/id/${Math.floor(Math.random()*400)+100}/1200/700" class="w-full">
            <div class="p-8">
              <p class="text-2xl italic leading-relaxed">"${input}"</p>
              <div class="mt-8 flex gap-4">
                <button class="flex-1 bg-purple-600 py-5 rounded-2xl font-bold">تحميل الفيديو</button>
                <button class="flex-1 bg-white text-black py-5 rounded-2xl font-bold">مشاركة على ريلز</button>
              </div>
            </div>
          </div>
        `;
      }, 2000);
    }

    function startNow() {
      document.getElementById('prompt').focus();
    }
  </script>
</body>
</html>
