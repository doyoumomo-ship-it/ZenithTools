<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZenithTask - منصة الإنجاز الذكي</title>
    <style>
        :root { --primary: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; }
        .app-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; }
        li { background: #f1f5f9; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>ZenithTask - إنجازك يبدأ هنا</h2>
    <input type="text" id="taskInput" placeholder="ما هي مهمتك القادمة؟">
    <button onclick="addTask()">إضافة المهمة</button>
    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        const input = document.getElementById('taskInput');
        const list = document.getElementById('taskList');
        if (!input.value) return;

        const li = document.createElement('li');
        li.innerHTML = `${input.value} <button onclick="this.parentElement.remove()" style="width:auto; padding:2px 10px; background:red;">X</button>`;
        list.appendChild(li);
        saveTasks();
        input.value = '';
    }

    function saveTasks() {
        localStorage.setItem('tasks', document.getElementById('taskList').innerHTML);
    }

    // استرجاع المهام عند تحميل الصفحة
    window.onload = () => {
        document.getElementById('taskList').innerHTML = localStorage.getItem('tasks') || '';
    };
</script>
</body>
</html>
