<style>
    :root { 
        --bg: #0b0e14; 
        --card: #161b22; 
        --accent: #58a6ff; 
        --text: #c9d1d9; 
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
    .container { max-width: 1000px; margin: auto; }
    h1 { text-align: center; color: var(--accent); font-size: 2.5rem; margin-bottom: 50px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
    .tool-card { 
        background: var(--card); padding: 25px; border-radius: 16px; 
        border: 1px solid #30363d; transition: 0.4s; cursor: pointer;
    }
    .tool-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(88, 166, 255, 0.15); }
    input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 8px; margin: 10px 0; }
    button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
</style>
