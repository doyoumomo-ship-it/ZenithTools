<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رؤيا - تفسير أحلامك بالذكاء الاصطناعي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
    body { font-family: 'Cairo', sans-serif; }
    .hero { background: linear-gradient(135deg, #1a1033 0%, #3b0764 100%); }
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
  </style>
</head>
<body class="bg-gray-950 text-white">

  <nav class="fixed top-0 w-full z-50 glass border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-4xl font-black tracking-tighter text-purple-300">رؤيا</h1>
      <button onclick="startDream()" class="bg-gradient-to-r from-purple-600 to-violet-600 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition">
        ابدأ تفسير حلمك
      </button>
    </div>
  </nav>

  <section class="hero min-h-screen flex items-center pt-20">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h1 class="text-6xl md:text-7xl font-black leading-tight mb-8">
        حلمك.. <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">له معنى</span>
      </h1>
      <p class="text-2xl text-gray-300 max-w-2xl mx-auto mb-12">
        اكتب حلمك أو ارفع صورة.. والذكاء الاصطناعي يفسره لك حسب التفسير الإسلامي + علم النفس مع دعاء مخصص
      </p>

      <div class="max-w-2xl mx-auto">
        <div class="glass rounded-3xl p-3">
          <textarea id="dreamInput" rows="4" 
                    placeholder="رأيت في المنام أني أطير فوق المدينة..." 
                    class="w-full bg-transparent px-8 py-6 text-lg focus:outline-none rounded-3xl resize-none"></textarea>
        </div>

        <button onclick="interpretDream()" 
                class="mt-8 w-full bg-white text-black font-bold text-2xl py-7 rounded-3xl flex items-center justify-center gap-4 hover:bg-yellow-300 transition">
          <i class="fas fa-moon"></i>
          فسّر حلمي الآن
        </button>
      </div>

      <p class="text-gray-400 mt-10">أكثر من ٢٨٠ ألف حلم تم تفسيرهم هذا الشهر</p>
    </div>
  </section>

  <div id="result" class="hidden max-w-4xl mx-auto px-6 py-20">
    <div id="demoContent" class="space-y-8"></div>
  </div>

  <script>
    function interpretDream() {
      const input = document.getElementById('dreamInput').value.trim();
      if (!input) {
        alert("اكتب حلمك أولاً 🌙");
        return;
      }

      const result = document.getElementById('result');
      const content = document.getElementById('demoContent');

      content.innerHTML = `
        <div class="text-center py-12">
          <div class="animate-spin w-20 h-20 border-4 border-purple-500 border-t-transparent rounded-full mx-auto mb-6"></div>
          <p class="text-2xl">رؤيا تفكر في حلمك بعمق...</p>
        </div>
      `;
      result.classList.remove('hidden');
      result.scrollIntoView({ behavior: "smooth" });

      setTimeout(() => {
        content.innerHTML = `
          <div class="bg-gradient-to-br from-purple-900 to-violet-900 rounded-3xl p-10">
            <h2 class="text-3xl font-bold mb-6">تفسير حلمك</h2>
            <p class="text-xl leading-relaxed">"${input}"</p>
            <div class="mt-10 pt-8 border-t border-white/20">
              <p class="text-purple-300 font-medium">التفسير:</p>
              <p class="mt-3 text-lg">يشير الطيران إلى الارتفاع في الرزق أو النجاح والحرية من الهموم (ابن سيرين). وقد يعكس رغبتك في التخلص من قيود الحياة اليومية.</p>
            </div>
            <div class="mt-8 bg-white/10 p-6 rounded-2xl">
              <p class="text-purple-300 font-medium">دعاء مخصص:</p>
              <p class="mt-3 italic">"اللهم إن كان خيراً فثبته، وإن كان شراً فاصرفه عني.."</p>
            </div>
          </div>
          <div class="text-center mt-10">
            <button class="bg-white text-black px-10 py-5 rounded-2xl font-bold">حفظ الحلم + تفسيرات إضافية</button>
          </div>
        `;
      }, 2200);
    }

    function startDream() {
      document.getElementById('dreamInput').focus();
    }
  </script>
</body>
</html>
