<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZenithTools - مولد كلمات المرور</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        button { background: #6200ea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        #password { font-size: 24px; margin: 20px 0; color: #333; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h1>مولد كلمات المرور</h1>
    <div id="password">اضغط لإنشاء كلمة سر</div>
    <button onclick="generatePassword()">إنشاء كلمة مرور جديدة</button>
</div>

<script>
    function generatePassword() {
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
        let password = "";
        for (let i = 0; i < 12; i++) {
            password += charset.charAt(Math.floor(Math.random() * charset.length));
        }
        document.getElementById("password").innerText = password;
    }
</script>

</body>
</html>
