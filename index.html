<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithTools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#0a0a1a;color:#fff}
        .container{max-width:1000px;margin:auto;padding:0 20px}
        
        header{background:rgba(10,10,26,0.95);padding:15px 0;border-bottom:1px solid #1e1e3a;position:sticky;top:0;z-index:999}
        header .container{display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:24px;font-weight:800;display:flex;align-items:center;gap:10px}
        .logo i{color:#8b5cf6;font-size:28px}
        .logo span{background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .btn{padding:10px 28px;border-radius:50px;font-weight:600;border:none;cursor:pointer;transition:0.3s;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:#8b5cf6;color:#fff}
        .btn-primary:hover{background:#7c3aed;transform:translateY(-2px)}
        .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
        .btn-outline{background:transparent;color:#fff;border:1.5px solid #1e1e3a}
        .btn-outline:hover{border-color:#8b5cf6}
        
        .hero{padding:50px 0 30px;text-align:center}
        .hero h1{font-size:40px;margin-bottom:10px}
        .hero h1 span{background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hero p{color:#a0a0c0;font-size:17px;max-width:500px;margin:auto}
        
        .services{padding:40px 0}
        .services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:20px}
        .service-card{background:#12122a;border:1px solid #1e1e3a;border-radius:12px;padding:20px 15px;text-align:center;cursor:pointer;transition:0.3s}
        .service-card:hover{transform:translateY(-4px);border-color:#8b5cf6}
        .service-card .icon{font-size:30px;color:#8b5cf6;display:block;margin-bottom:8px}
        .service-card h3{font-size:15px}
        .service-card .price-tag{display:inline-block;background:rgba(139,92,246,0.12);color:#a78bfa;padding:2px 12px;border-radius:50px;font-size:12px;font-weight:700;margin-top:8px}
        
        .workspace{background:#12122a;border:1px solid #1e1e3a;border-radius:16px;padding:25px;margin:20px 0 40px}
        .workspace-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px}
        .credit-box{background:rgba(16,185,129,0.12);color:#34d399;padding:6px 18px;border-radius:50px;font-weight:600;font-size:14px}
        .service-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}
        .service-selector button{padding:7px 16px;border-radius:50px;border:1.5px solid #1e1e3a;background:transparent;color:#a0a0c0;cursor:pointer;transition:0.3s;font-size:13px}
        .service-selector button:hover{border-color:#8b5cf6;color:#fff}
        .service-selector button.active{background:#8b5cf6;border-color:#8b5cf6;color:#fff}
        
        textarea{width:100%;min-height:120px;background:#0a0a1a;border:1px solid #1e1e3a;border-radius:10px;padding:14px;color:#fff;font-size:14px;resize:vertical}
        textarea:focus{outline:none;border-color:#8b5cf6}
        textarea::placeholder{color:#606080}
        .actions{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
        
        .loading{display:none;text-align:center;padding:20px 0}
        .loading.show{display:block}
        .spinner{width:35px;height:35px;border:3px solid #1e1e3a;border-top:3px solid #8b5cf6;border-radius:50%;animation:spin 0.8s linear infinite;margin:auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .output-area{display:none;margin-top:20px;background:#0a0a1a;border-radius:10px;padding:18px;border:1px solid #1e1e3a}
        .output-area.show{display:block}
        .output-content{color:#e0e0f0;line-height:1.8;white-space:pre-wrap;font-size:14px}
        .output-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
        
        .toast{position:fixed;bottom:20px;right:20px;background:#12122a;border:1px solid #1e1e3a;padding:12px 24px;border-radius:10px;z-index:9999;transform:translateY(80px);opacity:0;transition:0.4s}
        .toast.show{transform:translateY(0);opacity:1}
        .toast.success{border-color:#10b981}
        .toast.error{border-color:#ef4444}
        
        footer{text-align:center;color:#a0a0c0;padding:20px 0;border-top:1px solid #1e1e3a;margin-top:20px;font-size:13px}
        
        @media(max-width:600px){.hero h1{font-size:28px}.workspace{padding:16px}.services-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
    <div class="container">
        <div class="logo"><i class="fas fa-brain"><span>ZenithTools</span></div>
        <button class="btn btn-primary" id="authBtn" style="padding:8px 20px;font-size:13px;">ابدأ مجاناً</button>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1>خدمات <span>الذكاء الاصطناعي</span></h1>
        <p>كتابة، تلخيص، ترجمة، تحليل، برمجة، أفكار - كل ذلك بمكان واحد</p>
    </div>
</section>

<section class="services" id="services">
    <div class="container">
        <div class="services-grid">
            <div class="service-card" data-s="write"><span class="icon"><i class="fas fa-pen-fancy"></i></span><h3>كتابة</h3><span class="price-tag">5 نقاط</span></div>
            <div class="service-card" data-s="summarize"><span class="icon"><i class="fas fa-compress"></i></span><h3>تلخيص</h3><span class="price-tag">3 نقاط</span></div>
            <div class="service-card" data-s="translate"><span class="icon"><i class="fas fa-language"></i></span><h3>ترجمة</h3><span class="price-tag">3 نقاط</span></div>
            <div class="service-card" data-s="analyze"><span class="icon"><i class="fas fa-heart"></i></span><h3>تحليل</h3><span class="price-tag">4 نقاط</span></div>
            <div class="service-card" data-s="code"><span class="icon"><i class="fas fa-code"></i></span><h3>برمجة</h3><span class="price-tag">6 نقاط</span></div>
            <div class="service-card" data-s="ideas"><span class="icon"><i class="fas fa-lightbulb"></i></span><h3>أفكار</h3><span class="price-tag">2 نقاط</span></div>
        </div>
    </div>
</section>

<section class="workspace" id="workspace">
    <div class="container">
        <div class="workspace-header">
            <h3 style="font-size:18px;"><i class="fas fa-terminal" style="color:#8b5cf6;margin-left:8px;"></i>مساحة العمل</h3>
            <div class="credit-box"><i class="fas fa-coins"></i> الرصيد: <span id="creditDisplay">100</span></div>
        </div>

        <div class="service-selector" id="serviceSelector">
            <button class="active" data-s="write">✍️ كتابة</button>
            <button data-s="summarize">📝 تلخيص</button>
            <button data-s="translate">🌐 ترجمة</button>
            <button data-s="analyze">❤️ تحليل</button>
            <button data-s="code">💻 برمجة</button>
            <button data-s="ideas">💡 أفكار</button>
        </div>

        <textarea id="inputText" placeholder="اكتب موضوعك هنا..."></textarea>
        <div class="actions">
            <button class="btn btn-primary" id="generateBtn"><i class="fas fa-wand-magic-sparkles"></i> توليد</button>
            <button class="btn btn-outline" id="clearBtn"><i class="fas fa-eraser"></i> مسح</button>
        </div>

        <div class="loading" id="loading"><div class="spinner"></div><p style="color:#a0a0c0;margin-top:8px;">جاري التوليد...</p></div>

        <div class="output-area" id="outputArea">
            <div class="output-content" id="outputContent"></div>
            <div class="output-actions">
                <button class="btn btn-outline" id="copyBtn" style="padding:6px 16px;font-size:12px;"><i class="fas fa-copy"></i> نسخ</button>
                <button class="btn btn-outline" id="exportBtn" style="padding:6px 16px;font-size:12px;"><i class="fas fa-download"></i> تحميل</button>
            </div>
        </div>
    </div>
</section>

<footer>
    <div class="container">© 2026 ذكاءAI - جميع الحقوق محفوظة 🤖</div>
</footer>

<script>
// ===== الحالة =====
let credits = 100;
let selected = 'write';
let isGenerating = false;
let loggedIn = false;

// ===== عناصر =====
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const toast = $('#toast');
const authBtn = $('#authBtn');
const creditDisplay = $('#creditDisplay');
const serviceSelector = $('#serviceSelector');
const inputText = $('#inputText');
const generateBtn = $('#generateBtn');
const clearBtn = $('#clearBtn');
const loading = $('#loading');
const outputArea = $('#outputArea');
const outputContent = $('#outputContent');
const copyBtn = $('#copyBtn');
const exportBtn = $('#exportBtn');

// ===== توست =====
function showToast(msg, type = 'success') {
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== تحديث الرصيد =====
function updateCredits() { creditDisplay.textContent = credits; }

// ===== تسجيل الدخول =====
authBtn.addEventListener('click', () => {
    if (!loggedIn) {
        loggedIn = true;
        credits = 100;
        authBtn.textContent = '👤 حسابي';
        authBtn.style.background = '#10b981';
        updateCredits();
        showToast('🎉 مرحباً بك!');
    } else {
        loggedIn = false;
        credits = 0;
        authBtn.textContent = 'ابدأ مجاناً';
        authBtn.style.background = '#8b5cf6';
        updateCredits();
        showToast('👋 تم الخروج', 'error');
    }
});

// ===== اختيار الخدمة =====
serviceSelector.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    $$('#serviceSelector button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selected = btn.dataset.s;
    const ph = { write: 'اكتب موضوع المقال...', summarize: 'الصق النص الطويل...', translate: 'اكتب النص للترجمة...', analyze: 'اكتب النص للتحليل...', code: 'صف المشكلة البرمجية...', ideas: 'اكتب المجال للأفكار...' };
    inputText.placeholder = ph[selected] || 'اكتب نصك...';
});

// ===== بطاقات الخدمات =====
$$('.service-card').forEach(c => {
    c.addEventListener('click', () => {
        const s = c.dataset.s;
        $$('#serviceSelector button').forEach(b => b.classList.toggle('active', b.dataset.s === s));
        selected = s;
        document.getElementById('workspace').scrollIntoView({ behavior: 'smooth' });
        const ph = { write: 'اكتب موضوع المقال...', summarize: 'الصق النص الطويل...', translate: 'اكتب النص للترجمة...', analyze: 'اكتب النص للتحليل...', code: 'صف المشكلة البرمجية...', ideas: 'اكتب المجال للأفكار...' };
        inputText.placeholder = ph[s] || 'اكتب نصك...';
        inputText.focus();
    });
});

// ===== الردود =====
function getResponse(s, input) {
    const data = {
        write: `📝 **المقال:**\n\n"${input || 'الذكاء الاصطناعي'}"

الذكاء الاصطناعي يغير العالم بسرعة. في العالم العربي، نرى تبنيًا متزايدًا لهذه التقنية.

**الفوائد:**
• تحسين الإنتاجية
• أتمتة المهام
• تحليل البيانات

**التحديات:**
• نقص الكوادر
• التكلفة العالية

المستقبل مشرق مع المزيد من التطوير.`,
        summarize: `📌 **الملخص:**\n\n"${input || 'نص طويل...'}"

**النقاط الرئيسية:**
1. النقطة الأولى المهمة
2. النقطة الثانية الأساسية
3. النقطة الثالثة الختامية

⏱️ وقت القراءة: 3 دقائق`,
        translate: `🌐 **الترجمة:**\n\n"${input || 'Hello'}"\n\n⬇️ إلى العربية:\n"مرحباً"\n\n⬇️ إلى الإنجليزية:\n"${input || 'مرحباً'}"`,
        analyze: `❤️ **تحليل المشاعر:**\n\n"${input || 'هذا رائع!'}"\n\n📊 إيجابي: 78%\n📊 سلبي: 12%\n📊 محايد: 10%\n\n💡 توصية: نص إيجابي يمكن استخدامه للتسويق.`,
        code: `💻 **الكود:**\n\n// ${input || 'جمع رقمين'}\n\`\`\`python\ndef solve(a, b):\n    return a + b\n\nprint(solve(5, 10))  # 15\n\`\`\``,
        ideas: `💡 **الأفكار:**\n\nلمجال: ${input || 'المشاريع الرقمية'}\n\n1. منصة تعليمية ذكية\n2. تطبيق مساعد شخصي\n3. روبوت محادثة\n4. أداة تحليل سوق\n5. منصة محتوى تفاعلية\n\n🚀 ابدأ اليوم!`
    };
    return data[s] || data.write;
}

// ===== توليد =====
async function generate() {
    if (isGenerating) return;
    const input = inputText.value.trim();
    if (!input) { showToast('✍️ اكتب النص أولاً', 'error'); return; }
    if (!loggedIn) { showToast('🔐 سجل الدخول أولاً', 'error'); return; }
    
    const costs = { write: 5, summarize: 3, translate: 3, analyze: 4, code: 6, ideas: 2 };
    const cost = costs[selected] || 5;
    if (credits < cost) { showToast('💰 رصيد غير كافٍ', 'error'); return; }
    
    credits -= cost;
    updateCredits();
    isGenerating = true;
    generateBtn.disabled = true;
    generateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
    loading.classList.add('show');
    outputArea.classList.remove('show');
    
    await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));
    
    outputContent.textContent = getResponse(selected, input);
    outputArea.classList.add('show');
    loading.classList.remove('show');
    isGenerating = false;
    generateBtn.disabled = false;
    generateBtn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> توليد';
    showToast('✅ تم التوليد!');
}

// ===== نسخ =====
copyBtn.addEventListener('click', async () => {
    const t = outputContent.textContent;
    if (!t) { showToast('📭 لا يوجد نص', 'error'); return; }
    try { await navigator.clipboard.writeText(t); showToast('📋 تم النسخ!'); } 
    catch { const r = document.createRange(); r.selectNode(outputContent); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); document.execCommand('copy'); showToast('📋 تم النسخ!'); }
});

// ===== تحميل =====
exportBtn.addEventListener('click', () => {
    const t = outputContent.textContent;
    if (!t) { showToast('📭 لا يوجد نص', 'error'); return; }
    const blob = new Blob([t], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `ذكاءAI_${Date.now()}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('📥 تم التحميل!');
});

// ===== مسح =====
clearBtn.addEventListener('click', () => {
    inputText.value = '';
    outputArea.classList.remove('show');
    outputContent.textContent = '';
    showToast('🗑️ تم المسح');
});

// ===== أحداث =====
generateBtn.addEventListener('click', generate);
inputText.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); generate(); } });

// ===== تهيئة =====
updateCredits();
inputText.placeholder = 'اكتب موضوع المقال...';
console.log('🚀 ذكاءAI جاهز! اضغط Ctrl+Enter للتوليد');
</script>

</body>
</html>
